                 alt="Document Chamber">






</ul>

</div>

<div class="main-content">

<h2>Document Chamber</h2>

<div class="document-box">

<h4>Upload Contract / Agreement</h4>

<input
type="file"
id="fileInput"
class="form-control mb-3"
>

<p id="fileName">
No File Selected
</p>

</div>

<div class="signature-box mt-4">



<h4>E-Signature</h4>

<input
type="text"
id="signature"
placeholder="Type Your Signature"
class="form-control mb-3"
>

<button
id="signBtn"
class="btn btn-success"
>
Sign Document
</button>


<p id="signedText" class="mt-3"></p>

<button id="downloadPdfBtn" class="btn btn-primary mt-3">
    Download Signed PDF
</button>

</div>

<div class="status-box mt-4">

<h4>Document Status</h4>

<select id="statusSelect" class="form-select">

<option>Draft</option>

<option>In Review</option>

<option>Signed</option>

</select>

<div id="statusBadge" class="badge-status mt-3">
Draft
</div>

</div>

</div>

</div>

<script src="js/documents.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
